name: Auto-merge Claude branch to main

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Merge into main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin main
          git checkout main
          git merge --no-ff -X theirs origin/${{ github.ref_name }} -m "Auto-merge ${{ github.ref_name }} into main"
          node scripts/generate-sitemap.mjs
          git add public/sitemap.xml
          git diff --cached --quiet || git commit -m "Regenerate sitemap after merge"
          git push origin main
